<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Note</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Toast notifications -->
    <div id="toast" class="toast" style="display: none">
      <span id="toastMessage"></span>
      <button id="toastAction" class="toast-action" style="display: none"></button>
    </div>

    <div class="app-container">
      <!-- Header -->
      <header class="app-header">
        <div class="header-content">
          <h1 class="app-title">Webnote</h1>
          <div class="header-controls">
            <label class="toggle-switch" title="Enable/Disable floating icon">
              <input type="checkbox" id="extensionToggle" checked />
              <span class="toggle-slider"></span>
            </label>
            <button id="settingsBtn" class="icon-btn" title="ClickUp settings">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="3"></circle>
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="app-main">
        <!-- Add Note Section -->
        <div class="compose-section">
          <div class="compose-box">
            <textarea
              id="newNoteInput"
              placeholder="Write a note..."
              rows="3"
            ></textarea>
            <div class="compose-actions">
              <input
                type="url"
                id="newNoteUrl"
                placeholder="🔗 Add link (optional)"
                class="link-input"
              />
              <button id="addNoteBtn" class="add-btn">
                <span>Add note</span>
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Notes List -->
        <div id="notesList" class="notes-container">
          <!-- Notes will be dynamically inserted here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none">
          <div class="empty-icon">📝</div>
          <p class="empty-title">No notes yet</p>
          <p class="empty-text">
            Select text on any webpage and save it as a note
          </p>
        </div>
      </main>
    </div>

    <script src="storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
